<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Daily Diary 🏹</title>
    <style>
        body { background-color: #fffafb; font-family: 'Segoe UI', sans-serif; padding: 40px; color: #555; }
        .container { max-width: 1000px; margin: 0 auto; }
        .back-link { text-decoration: none; color: #ffb6c1; font-size: 0.8rem; margin-bottom: 20px; display: inline-block; }
        h1 { font-size: 1.8rem; margin-bottom: 30px; font-weight: normal; color: #444; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.03); }
        th { text-align: left; padding: 12px; color: #999; font-weight: normal; font-size: 0.8rem; border-bottom: 1px solid #eee; background: #fafafa; }
        td { padding: 15px 12px; border-bottom: 1px solid #f9f9f9; font-size: 0.9rem; }
        .edit-text { outline: none; padding: 2px 5px; border-radius: 4px; transition: 0.2s; min-width: 20px; display: inline-block; }
        .edit-text:focus { background: #fff0f3; box-shadow: 0 0 5px rgba(255,182,193,0.5); }
        .emotion-tag { background: #fef0f2; padding: 4px 10px; border-radius: 5px; cursor: pointer; display: inline-block; }
        .add-form { margin-top: 30px; display: flex; gap: 10px; background: #fff; padding: 20px; border-radius: 12px; border: 1px dashed #ffb6c1; }
        .add-form input, .add-form select { border: 1px solid #eee; padding: 8px 12px; border-radius: 8px; outline: none; font-size: 0.85rem; }
        .btn-add { background: #ffb6c1; color: white; border: none; padding: 8px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <a href="/" class="back-link">⇠ back to home</a>
        <h1>how was your day? 🏹</h1>
        <table>
            <thead>
                <tr>
                    <th>🏹 day</th>
                    <th>🏹 grateful for</th>
                    <th>🏹 rating</th>
                    <th>🏹 emotion</th>
                    <th></th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="entry : ${dailyList}">
                    <td><div contenteditable="true" class="edit-text" th:text="${entry.date}" 
                             th:onblur="|updateDaily('${entry.id}', 'date', this.innerText)|"></div></td>
                    <td><div contenteditable="true" class="edit-text" th:text="${entry.grateful}" 
                             th:onblur="|updateDaily('${entry.id}', 'grateful', this.innerText)|"></div></td>
                    <td><div contenteditable="true" class="edit-text" th:text="${entry.rating}" 
                             th:onblur="|updateDaily('${entry.id}', 'rating', this.innerText)|"></div></td>
                    <td><span class="emotion-tag" th:text="${entry.emotion}">😆</span></td>
                    <td>
                        <form th:action="@{/delete-daily}" method="post">
                            <input type="hidden" name="id" th:value="${entry.id}" />
                            <button type="submit" style="background:none; border:none; color:#ddd; cursor:pointer; font-size: 1.2rem;">×</button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>

        <form th:action="@{/add-daily}" method="post" class="add-form">
            <input type="text" name="date" placeholder="Ngày..." style="width: 100px;" required>
            <input type="text" name="grateful" placeholder="Điều biết ơn..." style="flex: 1;" required>
            <input type="number" name="rating" min="1" max="5" value="5" style="width: 70px;">
            <select name="emotion" style="width: 100px;">
                <option value="😆">😆</option><option value="🥰">🥰</option>
                <option value="😴">😴</option><option value="☁️">☁️</option>
                <option value="🍑">🍑</option><option value="🌷">🌷</option>
            </select>
            <button type="submit" class="btn-add">+ New entry</button>
        </form>
    </div>

    <script>
        // Hàm cập nhật dữ liệu qua Ajax
        function updateDaily(id, field, value) {
            console.log("Đang cập nhật:", id, field, value);
            fetch(`/update-daily?id=${id}&field=${field}&value=${encodeURIComponent(value)}`)
                .then(response => {
                    if(response.ok) console.log("Đã cập nhật thành công!");
                });
        }

        // Chặn phím Enter để không làm vỡ bảng
        document.querySelectorAll('.edit-text').forEach(el => {
            el.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    el.blur();
                }
            });
        });
    </script>
</body>
</html>
