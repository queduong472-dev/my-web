<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Nhật kí linh tinh 🍑</title>
    <style>
        body { background-color: #fffafb; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; padding: 50px; margin: 0; }
        .back-home { text-decoration: none; color: #ffb6c1; font-size: 0.9rem; position: absolute; top: 20px; left: 20px; }
        .diary-container { display: flex; gap: 40px; max-width: 1000px; width: 100%; align-items: flex-start; }
        
        .sidebar-images { display: flex; flex-direction: column; gap: 20px; width: 180px; flex-shrink: 0; }
        .sidebar-images img { width: 100%; border-radius: 25px; border: 6px solid white; box-shadow: 0 6px 15px rgba(255,182,193,0.1); }

        .main-content { flex: 1; background: white; padding: 40px; border-radius: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.02); border: 1px solid #fff0f3; }
        h1 { font-weight: normal; color: #444; margin: 0 0 5px 0; }
        .subtitle { color: #ffb6c1; font-size: 0.9rem; margin-bottom: 30px; }
        
        textarea { width: 100%; height: 180px; border: 1px solid #fff0f3; border-radius: 20px; padding: 18px; font-family: inherit; outline: none; margin-bottom: 15px; resize: none; background-color: #fffafb; box-sizing: border-box; }
        .save-btn { background: #ffb6c1; color: white; border: none; padding: 10px 25px; border-radius: 12px; cursor: pointer; font-weight: bold; }
        
        .entry-list { margin-top: 100px; clear: both; }
        .entry-item { border-left: 3px solid #fff0f3; padding-left: 25px; margin-bottom: 45px; position: relative; }
        .entry-date { font-size: 0.8rem; color: #ffb6c1; margin-bottom: 8px; font-weight: bold; }
        .entry-text { color: #666; line-height: 1.7; white-space: pre-wrap; margin-bottom: 10px; }
        
        .del-diary { color: #eee; border: none; background: none; cursor: pointer; font-size: 0.9rem; margin-left: 10px; }
        .entry-item:hover .del-diary { color: #ffb6c1; }
        .edit-btn { background: none; border: none; color: #ffb6c1; cursor: pointer; font-size: 0.8rem; padding: 0; }
        .cancel-btn { background: none; border: none; color: #ccc; cursor: pointer; font-size: 0.8rem; margin-left: 10px; }
    </style>
</head>
<body>
    <a href="/" class="back-home">⇠ back to home</a>

    <div class="diary-container">
        <div class="sidebar-images">
            <img src="/images/chiikawa-blue.jpg" alt="Blue">
            <img src="/images/chiikawa-pink.jpg" alt="Pink">
            <img src="/images/usagi-yellow.jpg" alt="Yellow">
        </div>

        <div class="main-content">
            <h1>Nhật kí linh tinh 🍑</h1>
            <div class="subtitle">nơi mèo con trút bầu tâm sự...</div>
            
            <form th:action="@{/add-diary}" method="post">
                <textarea name="content" placeholder="Hôm nay của bạn thế nào? Viết vài dòng nhe..."></textarea>
                <button type="submit" class="save-btn" style="float: right;">Gửi gió mang đi ✨</button>
            </form>

            <div class="entry-list">
                <div th:each="diary : ${diaryList}" class="entry-item">
                    <div class="entry-date" th:text="${diary.createdAt}"></div>
                    
                    <div class="entry-text" th:id="'text-' + ${diary.id}" th:text="${diary.content}"></div>

                    <form th:action="@{/update-diary}" method="post" th:id="'form-' + ${diary.id}" style="display:none; margin-bottom: 20px;">
                        <input type="hidden" name="id" th:value="${diary.id}">
                        <textarea name="content" th:text="${diary.content}" style="height: 100px; margin-bottom: 5px;"></textarea>
                        <button type="submit" class="save-btn" style="padding: 5px 15px; font-size: 0.8rem;">Lưu bài</button>
                        <button type="button" class="cancel-btn" th:onclick="|toggleEdit(${diary.id})|">Hủy</button>
                    </form>

                    <div th:id="'actions-' + ${diary.id}">
                        <button type="button" class="edit-btn" th:onclick="|toggleEdit(${diary.id})|">✎ Sửa bài</button>
                        
                        <form th:action="@{/delete-diary}" method="post" style="display:inline;">
                            <input type="hidden" name="id" th:value="${diary.id}">
                            <button type="submit" class="del-diary">× Xóa bài</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function toggleEdit(id) {
            const textDiv = document.getElementById('text-' + id);
            const editForm = document.getElementById('form-' + id);
            const actionsDiv = document.getElementById('actions-' + id);
            
            if (editForm.style.display === 'none') {
                editForm.style.display = 'block';
                textDiv.style.display = 'none';
                actionsDiv.style.display = 'none';
            } else {
                editForm.style.display = 'none';
                textDiv.style.display = 'block';
                actionsDiv.style.display = 'block';
            }
        }
    </script>
</body>
</html>
