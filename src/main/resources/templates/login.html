<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Minh ảnh's Secret Door 🔒</title>
    <style>
        body { background-color: #fffafb; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: 'Segoe UI', sans-serif; }
        .login-box { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); text-align: center; border: 1px solid #eee; width: 320px; }
        h1 { color: #333; font-size: 1.4rem; margin-bottom: 10px; }
        input { padding: 12px; border: 1px solid #eee; border-radius: 8px; width: 100%; outline: none; text-align: center; box-sizing: border-box; margin-bottom: 20px; transition: 0.3s; }
        input:focus { border-color: #ffb6c1; }
        button { background: #ffb6c1; color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; width: 100%; font-size: 1rem; transition: 0.3s; }
        button:hover { background: #ff99aa; transform: translateY(-2px); }
        .error-msg { color: #ff6b6b; font-size: 0.85rem; margin-top: 15px; background: #fff0f0; padding: 8px; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="login-box">
        <h1>Diary Lock 🔑</h1>
        <p style="color: #999; font-size: 0.9rem; margin-bottom: 25px;">Góc nhỏ của Minh ảnh</p>
        <form th:action="@{/login}" method="post">
            <input type="password" name="password" placeholder="Nhập mật mã bí mật..." autofocus required>
            <button type="submit">Mở cửa</button>
        </form>
        <div th:if="${error}" class="error-msg"><span th:text="${error}"></span></div>
        <img src="/cat-coffee.jpg" style="width: 80px; margin-top: 30px; border-radius: 50%; opacity: 0.7;">
    </div>
</body>
</html>
